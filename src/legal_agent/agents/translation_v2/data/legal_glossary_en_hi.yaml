# Baseline EN → formal-Hindi (शुद्ध हिन्दी विधिक रजिस्टर) glossary for
# Indian legal documents. Loaded at startup and merged with the per-document
# LLM-built glossary. Per-document entries win on key collision so a document
# can override the baseline if it consistently uses a different convention.
#
# Format: <english key>: <formal Devanagari Hindi translation>
# Keys are matched case-insensitively at lookup time. Multi-word keys are
# matched as a whole phrase, not word-by-word.

