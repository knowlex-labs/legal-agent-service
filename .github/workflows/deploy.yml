name: Deploy to EC2 (Production)

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: deploy-legal-agent-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy legal-agent-service
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          command_timeout: 40m
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.LEGAL_AGENT_DIR }}"
            IMAGE_NAME="legal-agent-service"
            CONTAINER_NAME="legal-agent-service"
            HOST_PORT="${{ secrets.LEGAL_AGENT_PORT || '8001' }}"

            if [ -z "$APP_DIR" ]; then
              echo "ERROR: secret LEGAL_AGENT_DIR is not set in GitHub Actions"
              exit 1
            fi
            if [ ! -d "$APP_DIR" ]; then
              echo "ERROR: APP_DIR=$APP_DIR does not exist on EC2"
              exit 1
            fi

            cd "$APP_DIR"

            echo ">>> Fetching latest production"
            git fetch --all --prune
            git checkout production
            git reset --hard origin/production

            echo ">>> Building image"
            docker build -t "$IMAGE_NAME:latest" .

            echo ">>> Restarting container"
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --env-file "$APP_DIR/.env" \
              -p "$HOST_PORT:8001" \
              "$IMAGE_NAME:latest"

            echo ">>> Pruning old images"
            docker image prune -f

            echo ">>> Status"
            docker ps --filter "name=$CONTAINER_NAME"
